version: "3"

tasks:
  test:
    desc: Run Go unit tests with race detector and coverage
    cmd: go test -race -cover ./...

  fmt:
    desc: Format Go code
    cmd: go fmt ./...

  lint:
    desc: Lint and vet Go code
    cmd: golangci-lint run

  verify:
    desc: Format, lint, and run all Go tests
    cmds:
      - task: fmt
      - task: lint
      - task: test

  example:
    desc: "Run an example. Usage: task example NAME=palette"
    requires:
      vars: [NAME]
    cmd: go run ./examples/{{.NAME}}

  release:
    desc: "Tag and push a release. Usage: task release VERSION=1.2.3"
    silent: true
    requires:
      vars: [VERSION]
    cmds:
      - |
        set -euo pipefail
        INPUT='{{.VERSION}}'
        TAG="v${INPUT#v}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists" >&2
          exit 1
        fi
        git tag -a "$TAG" -m "$TAG"
        git push origin "$TAG"
        echo "==> $TAG pushed"
