version: "3"

tasks:
  test:
    desc: Run Go unit tests with race detector and coverage
    cmd: go test -race -cover ./...

  fmt:
    desc: Format Go code
    cmd: go fmt ./...

  lint:
    desc: Lint and vet Go code
    cmd: golangci-lint run

  verify:
    desc: Format, lint, and run all Go tests
    cmds:
      - task: fmt
      - task: lint
      - task: test

  example:
    desc: "Run an example. Usage: task example NAME=palette/simple"
    requires:
      vars: [NAME]
    cmd: go run ./examples/{{.NAME}}

  demo:
    desc: "Regenerate demo GIFs. NAME=palette/simple for one; no NAME for all."
    silent: true
    cmds:
      - |
        set -euo pipefail
        if [ -n "{{.NAME}}" ]; then
          tape="examples/{{.NAME}}/demo.tape"
          test -f "$tape" || { echo "no tape at $tape" >&2; exit 1; }
          (cd "$(dirname "$tape")" && vhs demo.tape)
        else
          shopt -s nullglob globstar
          for tape in examples/**/demo.tape; do
            echo "==> $tape"
            (cd "$(dirname "$tape")" && vhs demo.tape)
          done
        fi

  release:
    desc: "Tag and push a release. Usage: task release VERSION=1.2.3"
    silent: true
    requires:
      vars: [VERSION]
    cmds:
      - |
        set -euo pipefail
        INPUT='{{.VERSION}}'
        TAG="v${INPUT#v}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists" >&2
          exit 1
        fi
        git tag -a "$TAG" -m "$TAG"
        git push origin "$TAG"
        echo "==> $TAG pushed"
